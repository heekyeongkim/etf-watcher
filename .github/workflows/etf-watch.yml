name: ETF Holdings Watcher

on:
  schedule:
    # UTC 기준. 한국시간 평일 오전 9:30 (구성종목/기준가 갱신 이후)
    - cron: '30 0 * * 1-5'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write         # 스냅샷(holdings.json) 커밋용

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python monitor.py

      - name: Commit snapshot
        run: |
          git config user.name "etf-bot"
          git config user.email "bot@users.noreply.github.com"
          git add holdings.json
          git diff --cached --quiet || git commit -m "update holdings snapshot [skip ci]"
          git push
